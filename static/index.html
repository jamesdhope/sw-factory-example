<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Factory | Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --sidebar: #0a0a0a;
            --border: #333;
            --text-main: #fff;
            --text-dim: #888;
            --blue: #0070f3;
            --success: #0070f3;
            --error: #ee0000;
            --warning: #f5a623;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo { font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; color: var(--text-main); }
        
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            padding: 4px 12px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 340px; /* Log focused layout */
            flex-grow: 1;
            overflow: hidden;
        }

        /* Generic Column Styles */
        .column {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .column-header {
            padding: 16px 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border);
            background: #000;
            z-index: 5;
        }

        /* Output Area (Dominant Left/Center) */
        .output-area { 
            background: #000; 
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
            position: relative;
        }
        
        /* Persistent Task Header in Output Area */
        .task-bar {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #030303;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .t-compact-card {
            min-width: 140px;
            padding: 8px 12px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .t-title { font-size: 0.7rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .t-status { font-size: 0.55rem; text-transform: uppercase; }
        
        .log-stream {
            flex-grow: 1;
            padding: 24px 32px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            overflow-y: auto;
            color: var(--text-dim);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .log-entry { margin-bottom: 8px; border-left: 2px solid transparent; padding-left: 12px; }
        .log-entry span { color: var(--blue); margin-right: 16px; font-weight: 500; font-size: 0.8rem; }
        .log-entry.current { color: var(--text-main); border-left-color: var(--blue); }

        /* Sidebar (Right) - State & Stats */
        .right-sidebar { background: var(--sidebar); }
        
        .panel-section {
            border-bottom: 1px solid var(--border);
            padding: 24px;
        }

        .pipeline-list { margin-top: 12px; }
        .pipeline-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        .pipeline-item.active { color: var(--text-main); font-weight: 500; }
        .p-dot-small { width: 5px; height: 5px; border-radius: 50%; border: 1px solid var(--border); }
        .active .p-dot-small { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 8px var(--blue); }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-box {
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .stat-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 1.1rem; font-weight: 600; }

        /* Scrollbar */
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    </style>
</head>
<body>
    <header>
        <div class="logo">GOOSE FACTORY · ORCHESTRATOR</div>
        <div class="status-pill">
            <div class="dot" id="p-dot"></div>
            <span id="f-state">IDLE</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Output Area (Live Log Focus) -->
        <div class="output-area">
            <div class="column-header">Real-time Stream</div>
            
            <div class="task-bar" id="task-queue">
                <div style="color: var(--text-dim); font-size: 0.7rem;">Waiting for planner nodes...</div>
            </div>

            <div class="log-stream" id="logs">
                <div class="log-entry">Booting core orchestrator...</div>
            </div>
        </div>

        <!-- Right Panel (State & Resource Hub) -->
        <div class="column right-sidebar">
            <div class="column-header">Factory State</div>
            
            <!-- Pipeline -->
            <div class="panel-section">
                <div class="stat-label" style="margin-bottom: 12px;">Lifecycle Stage</div>
                <div id="pipeline">
                    <div class="pipeline-item" id="STEP_IDLE"><div class="p-dot-small"></div> Idle</div>
                    <div class="pipeline-item" id="STEP_SPEC_DEVELOPMENT"><div class="p-dot-small"></div> Specification</div>
                    <div class="pipeline-item" id="STEP_PLANNING"><div class="p-dot-small"></div> Planning</div>
                    <div class="pipeline-item" id="STEP_EXECUTION"><div class="p-dot-small"></div> Execution</div>
                    <div class="pipeline-item" id="STEP_INTEGRATION"><div class="p-dot-small"></div> Integration</div>
                    <div class="pipeline-item" id="STEP_CODE_RELEASE"><div class="p-dot-small"></div> Completion</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="panel-section">
                <div class="stat-label" style="margin-bottom: 12px;">Resource Monitor</div>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-label">Tokens</div>
                        <div class="stat-val" id="s-tokens">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Progress</div>
                        <div class="stat-val" id="s-progress">0%</div>
                    </div>
                </div>
            </div>

            <!-- Context -->
            <div class="panel-section" style="border-bottom: none;">
                <div class="stat-label">Active Build</div>
                <div id="m-project" style="font-size: 0.9rem; font-weight: 500; margin: 8px 0;">-</div>
                <div id="m-build" style="font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--blue);">/builds/...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/status.json');
                const data = await res.json();
                
                // State Logic
                document.getElementById('f-state').textContent = data.state;
                const steps = ['IDLE', 'SPEC_DEVELOPMENT', 'PLANNING', 'EXECUTION', 'INTEGRATION', 'CODE_RELEASE'];
                steps.forEach(s => {
                    const el = document.getElementById(`STEP_${s}`);
                    if (el) s === data.state ? el.classList.add('active') : el.classList.remove('active');
                });

                // Stats
                const tasks = data.tasks || [];
                const completed = tasks.filter(t => t.status === 'COMPLETED').length;
                const progress = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
                
                document.getElementById('s-tokens').textContent = (data.total_tokens || 0).toLocaleString();
                document.getElementById('s-progress').textContent = `${progress}%`;
                document.getElementById('m-project').textContent = data.project || '-';
                document.getElementById('m-build').textContent = data.build_dir || '-';

                // Task bar updates
                const queue = document.getElementById('task-queue');
                if (tasks.length > 0) {
                    queue.innerHTML = tasks.map(t => `
                        <div class="t-compact-card" style="border-right: 2px solid ${t.status === 'COMPLETED' ? 'var(--success)' : t.status === 'WORKING' ? 'var(--warning)' : 'var(--border)'}">
                            <div class="t-title">${t.title}</div>
                            <div class="t-status" style="color: ${t.status === 'COMPLETED' ? 'var(--success)' : t.status === 'WORKING' ? 'var(--warning)' : 'var(--text-dim)'}">
                                ${t.status || 'Pending'}
                            </div>
                        </div>
                    `).join('');
                }

                // Logs (Appending focus)
                const logEl = document.getElementById('logs');
                if (data.history) {
                    logEl.innerHTML = data.history.map(entry => {
                        const [state, ...msg] = entry.split(' - ');
                        return `<div class="log-entry"><span>${state}</span> ${msg.join(' - ')}</div>`;
                    }).join('') + `<div class="log-entry current"><span>CURRENT</span> ${data.message}</div>`;
                    logEl.scrollTop = logEl.scrollHeight;
                }

                // Global Pulse
                const dot = document.getElementById('p-dot');
                if (data.state === 'FAILED') dot.style.background = 'var(--error)';
                else if (data.state === 'CODE_RELEASE') dot.style.background = 'var(--success)';
                else dot.style.background = 'var(--blue)';

            } catch (e) { console.error(e); }
        }

        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>
