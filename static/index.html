<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Factory | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --sidebar: #0a0a0a;
            --border: #333;
            --text-main: #fff;
            --text-dim: #888;
            --blue: #0070f3;
            --success: #0070f3;
            --error: #ee0000;
            --warning: #f5a623;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; color: var(--text-main); }
        
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            padding: 4px 12px;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }

        .main-container {
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Generic Column Styles */
        .column {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            height: 100%;
            overflow: hidden;
        }

        .column-header {
            padding: 16px 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        /* Pipeline (Left) */
        .pipeline-list { padding: 12px; }
        .pipeline-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .pipeline-item.active { background: #111; color: var(--text-main); }
        .p-num {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: 4px;
            font-size: 0.65rem;
        }
        .active .p-num { border-color: var(--blue); color: var(--blue); }

        /* Output (Center) */
        .output-area { background: #000; flex-grow: 1; display: flex; flex-direction: column; }
        .log-stream {
            flex-grow: 1;
            padding: 24px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            overflow-y: auto;
            color: var(--text-dim);
        }
        .log-entry span { color: var(--blue); margin-right: 12px; }
        .log-entry.current { color: var(--text-main); }

        /* Sidebar (Right) */
        .right-sidebar { border-right: none; background: var(--sidebar); }
        
        .stats-section {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .stat-box {
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-val { font-size: 1.1rem; font-weight: 600; }

        .task-list { flex-grow: 1; overflow-y: auto; padding: 16px; }
        .task-card {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .task-card h4 { font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
        .task-meta { font-size: 0.65rem; color: var(--text-dim); font-family: 'Fira Code'; }
        .task-footer {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
        }
        .badge { padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .b-comp { color: var(--blue); background: rgba(0,112,243,0.1); }
        .b-work { color: var(--warning); background: rgba(245,166,35,0.1); }
        .b-pend { color: var(--text-dim); background: #111; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    </style>
</head>
<body>
    <header>
        <div class="logo">O R C H E S T R A T O R</div>
        <div class="status-pill">
            <div class="dot" id="p-dot"></div>
            <span id="f-state">IDLE</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Pipeline -->
        <div class="column">
            <div class="column-header">Production Pipeline</div>
            <div class="pipeline-list" id="pipeline">
                <div class="pipeline-item" id="STEP_IDLE"><span class="p-num">1</span> Idle</div>
                <div class="pipeline-item" id="STEP_SPEC_DEVELOPMENT"><span class="p-num">2</span> Specification</div>
                <div class="pipeline-item" id="STEP_PLANNING"><span class="p-num">3</span> Planning</div>
                <div class="pipeline-item" id="STEP_EXECUTION"><span class="p-num">4</span> Execution</div>
                <div class="pipeline-item" id="STEP_INTEGRATION"><span class="p-num">5</span> Integration</div>
                <div class="pipeline-item" id="STEP_CODE_RELEASE"><span class="p-num">6</span> Release</div>
            </div>
            
            <div class="column-header" style="border-top: 1px solid var(--border);">Context</div>
            <div style="padding: 16px; font-size: 0.75rem;">
                <div style="color: var(--text-dim); margin-bottom: 4px;">Project</div>
                <div id="m-project" style="margin-bottom: 12px; font-weight: 500;">-</div>
                <div style="color: var(--text-dim); margin-bottom: 4px;">Build Dir</div>
                <div id="m-build" style="font-family: 'Fira Code'; color: var(--blue);">-</div>
            </div>
        </div>

        <!-- Output Area -->
        <div class="output-area">
            <div class="column-header">Live Worker Output</div>
            <div class="log-stream" id="logs">
                <div class="log-entry">Waiting for system pulse...</div>
            </div>
        </div>

        <!-- Task & Resource Sidebar -->
        <div class="column right-sidebar">
            <div class="column-header">Resource Consumption</div>
            <div class="stats-section">
                <div class="stat-box">
                    <div class="stat-label">Total Cost</div>
                    <div class="stat-val" id="s-tokens">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Progress</div>
                    <div class="stat-val" id="s-progress">0%</div>
                </div>
            </div>
            
            <div class="column-header">Task Orchestration</div>
            <div class="task-list" id="task-queue">
                <!-- Task cards injected here -->
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/status.json');
                const data = await res.json();
                
                // State Logic
                document.getElementById('f-state').textContent = data.state;
                const steps = ['IDLE', 'SPEC_DEVELOPMENT', 'PLANNING', 'EXECUTION', 'INTEGRATION', 'CODE_RELEASE'];
                steps.forEach(s => {
                    const el = document.getElementById(`STEP_${s}`);
                    if (el) s === data.state ? el.classList.add('active') : el.classList.remove('active');
                });

                // Stats & Progress
                const tasks = data.tasks || [];
                const completed = tasks.filter(t => t.status === 'COMPLETED').length;
                const progress = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
                
                document.getElementById('s-tokens').textContent = (data.total_tokens || 0).toLocaleString();
                document.getElementById('s-progress').textContent = `${progress}%`;
                document.getElementById('m-project').textContent = data.project || '-';
                document.getElementById('m-build').textContent = data.build_dir || '-';

                // Task Queue
                const queue = document.getElementById('task-queue');
                if (tasks.length > 0) {
                    queue.innerHTML = tasks.map(t => `
                        <div class="task-card">
                            <h4>${t.title}</h4>
                            <div class="task-meta">${t.branch || 'Pending branch...'}</div>
                            <div class="task-footer">
                                <div class="badge b-${t.status === 'COMPLETED' ? 'comp' : t.status === 'WORKING' ? 'work' : 'pend'}">
                                    ${t.status || 'Pending'}
                                </div>
                                <div style="color: var(--text-dim)">${(t.tokens || 0).toLocaleString()} tkn</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    queue.innerHTML = '<div style="color: var(--text-dim); font-size: 0.8rem; padding: 20px; border: 1px dashed var(--border); border-radius: 6px; text-align: center;">Waiting for Planner...</div>';
                }

                // Logs
                const logEl = document.getElementById('logs');
                if (data.history) {
                    logEl.innerHTML = data.history.map(entry => {
                        const [state, ...msg] = entry.split(' - ');
                        return `<div class="log-entry"><span>${state}</span> ${msg.join(' - ')}</div>`;
                    }).join('') + `<div class="log-entry current"><span>CURRENT</span> ${data.message}</div>`;
                    logEl.scrollTop = logEl.scrollHeight;
                }

                // Pulse dot
                const dot = document.getElementById('p-dot');
                if (data.state === 'FAILED') dot.style.background = 'var(--error)';
                else if (data.state === 'CODE_RELEASE') dot.style.background = 'var(--blue)';
                else dot.style.background = 'var(--blue)';

            } catch (e) { console.error(e); }
        }

        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>
